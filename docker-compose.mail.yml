# Local email testing with MailHog
# Run: docker compose -f docker-compose.mail.yml up -d
# Web UI: http://localhost:8025
# SMTP: localhost:1025 (no auth)
version: '3'
services:
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    # Alternative: dbck/mailtrap (Roundcube webmail)
    # image: dbck/mailtrap:latest
    # ports:
    #   - "9025:25"
    #   - "9587:587"
    #   - "9080:80"
