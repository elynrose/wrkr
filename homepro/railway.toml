# Railway deployment config for HomePro frontend
# Deploy this folder (homepro) as the service root. Set VITE_API_URL in Variables to your backend API URL (e.g. https://your-api.up.railway.app/api).

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
